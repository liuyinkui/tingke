<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听刻 · 首页 — 潮汐风格</title>
<style>
  /* ═══════════════════════════════════════════════
     DESIGN SYSTEM TOKENS
     ═══════════════════════════════════════════════ */
  :root {
    --primary: #1E3A5F;
    --primary-light: #2D5A8E;
    --primary-bg: #E8EDF2;
    --accent: #FF6B35;
    --accent-light: #FF8C5A;
    --bg: #F2F4F7;
    --bg-card: #FFFFFF;
    --text-primary: #1A1D21;
    --text-secondary: #636E72;
    --text-hint: #B2BEC3;
    --success: #00B894;
    --error: #FF6B6B;
    --divider: #E8ECF0;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --radius-max: 24px;
    --shadow-card: 0 1px 4px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
    --shadow-btn: 0 2px 8px rgba(30,58,95,0.15);
    --font: -apple-system, "PingFang SC", "SF Pro", "Helvetica Neue", sans-serif;
    --tide-bg-start: #EEF0F4;
    --tide-bg-end: #F5F6F9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1C1C1E;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: var(--font);
  }

  /* ═══ Phone Frame ═══ */
  .phone-frame {
    position: relative;
    width: 390px;
    height: 844px;
    background: linear-gradient(170deg, var(--tide-bg-start), var(--tide-bg-end));
    border-radius: 44px;
    overflow: hidden;
    box-shadow:
      0 0 0 2px #2C2C2E,
      0 0 0 6px #1C1C1E,
      0 20px 60px rgba(0,0,0,0.5);
  }

  /* ═══ Dynamic Island ═══ */
  .dynamic-island {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 36px;
    background: #111;
    border-radius: 20px;
    z-index: 100;
  }

  /* ═══ Status Bar ═══ */
  .status-bar {
    position: relative;
    height: 54px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 32px 4px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.3px;
  }
  .status-bar .time { font-size: 16px; font-weight: 700; }
  .status-bar .icons { display: flex; align-items: center; gap: 6px; }
  .status-bar .icons svg { display: block; }

  /* ═══ Content ═══ */
  .content {
    padding: 20px 24px 34px;
    height: calc(100% - 54px);
    display: flex;
    flex-direction: column;
  }

  /* ═══ Header ═══ */
  .header {
    text-align: center;
    padding-top: 16px;
    animation: fadeUp 0.8s ease-out;
  }
  .header .date {
    font-size: 14px;
    color: var(--text-hint);
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .header .brand {
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 4px;
    margin-bottom: 2px;
  }
  .header .tagline {
    font-size: 13px;
    color: var(--text-secondary);
    letter-spacing: 2px;
  }

  /* ═══ Streak Badge ═══ */
  .streak-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin: 18px auto 0;
    padding: 6px 16px;
    background: rgba(255,107,53,0.08);
    border-radius: 20px;
    width: fit-content;
    animation: fadeUp 0.8s ease-out 0.15s both;
  }
  .streak-badge .flame {
    font-size: 16px;
    line-height: 1;
  }
  .streak-badge .count {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
  }
  .streak-badge .label {
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* ═══ Spacer ═══ */
  .spacer { flex: 1; }
  .spacer-sm { flex: 0.3; }

  /* ═══ Today's Card ═══ */
  .today-card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    box-shadow: var(--shadow-card);
    text-align: center;
    animation: fadeUp 0.8s ease-out 0.3s both;
  }
  .today-card .label {
    font-size: 12px;
    color: var(--text-hint);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .today-card .title {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .today-card .title-en {
    font-size: 15px;
    color: var(--text-secondary);
    font-style: italic;
    margin-bottom: 18px;
  }
  .today-card .meta {
    display: flex;
    justify-content: center;
    gap: 20px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .today-card .meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .today-card .meta .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--divider);
  }

  /* ═══ CTA Button ═══ */
  .cta-section {
    padding-top: 20px;
    padding-bottom: 8px;
    text-align: center;
    animation: fadeUp 0.8s ease-out 0.45s both;
  }
  .cta-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    height: 54px;
    background: var(--primary);
    color: #fff;
    font-size: 17px;
    font-weight: 600;
    border: none;
    border-radius: var(--radius-md);
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: var(--shadow-btn);
    transition: all 0.25s ease;
  }
  .cta-btn:hover {
    background: var(--primary-light);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(30,58,95,0.25);
  }
  .cta-btn:active {
    transform: translateY(0);
    box-shadow: 0 1px 4px rgba(30,58,95,0.15);
  }
  .cta-btn .arrow {
    font-size: 18px;
    transition: transform 0.25s ease;
  }
  .cta-btn:hover .arrow {
    transform: translateX(3px);
  }

  /* ═══ Footer Hint ═══ */
  .footer-hint {
    text-align: center;
    font-size: 12px;
    color: var(--text-hint);
    letter-spacing: 0.5px;
    margin-top: 6px;
    animation: fadeUp 0.8s ease-out 0.55s both;
  }

  /* ═══ Decorations (潮汐感) ═══ */
  .bg-decor {
    position: absolute;
    border-radius: 50%;
    opacity: 0.03;
    pointer-events: none;
  }
  .bg-decor-1 {
    top: -80px;
    right: -60px;
    width: 240px;
    height: 240px;
    background: var(--primary);
  }
  .bg-decor-2 {
    bottom: 100px;
    left: -100px;
    width: 300px;
    height: 300px;
    background: var(--accent);
  }

  /* ═══ Animations ═══ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* ═══ Breathing Dots (subtle tide feel) ═══ */
  .breathing-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
  }
  .breathing-dots .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--divider);
    animation: breathe 3s ease-in-out infinite;
  }
  .breathing-dots .dot:nth-child(2) { animation-delay: 0.5s; }
  .breathing-dots .dot:nth-child(3) { animation-delay: 1s; }

  @keyframes breathe {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.2); }
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Dynamic Island -->
  <div class="dynamic-island"></div>

  <!-- Background Decor -->
  <div class="bg-decor bg-decor-1"></div>
  <div class="bg-decor bg-decor-2"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <rect x="0.5" y="0.5" width="15" height="11" rx="2" stroke="#1A1D21" stroke-opacity="0.5"/>
        <rect x="12" y="4" width="3" height="2" rx="0.5" fill="#1A1D21" fill-opacity="0.3"/>
      </svg>
      <svg width="24" height="12" viewBox="0 0 24 12" fill="none">
        <rect x="0" y="1" width="18" height="10" rx="4" fill="#1A1D21"/>
        <rect x="2" y="3" width="6" height="6" rx="2" fill="#1A1D21" fill-opacity="0.3"/>
        <rect x="9" y="3.5" width="4" height="5" rx="1.5" fill="#1A1D21" fill-opacity="0.3"/>
      </svg>
    </div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Header -->
    <div class="header">
      <div class="date">2026.06.04 星期四</div>
      <div class="brand">听刻</div>
      <div class="tagline">把声音刻进脑子里</div>
    </div>

    <!-- Streak -->
    <div class="streak-badge">
      <span class="flame">🔥</span>
      <span class="count">7</span>
      <span class="label">天连续</span>
    </div>

    <div class="spacer-sm"></div>

    <!-- Today's Card -->
    <div class="today-card">
      <div class="label">今日练习</div>
      <div class="title">人类世的终结</div>
      <div class="title-en">The End of the Anthropocene</div>
      <div class="meta">
        <span>🎧 盲听</span>
        <span class="dot"></span>
        <span>✍️ 听写</span>
        <span class="dot"></span>
        <span>🗣️ 跟读</span>
      </div>
      <div style="margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--divider); display: flex; justify-content: space-between; font-size: 13px; color: var(--text-secondary);">
        <span>难度 · 中高级</span>
        <span>⏱ 约 15 分钟</span>
      </div>
    </div>

    <div class="spacer"></div>

    <!-- CTA -->
    <div class="cta-section">
      <button class="cta-btn">
        <span>开始今日练习</span>
        <span class="arrow">→</span>
      </button>
    </div>

    <!-- Breathing dots -->
    <div class="breathing-dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div class="footer-hint">每天 15 分钟，三步练听力</div>

  </div>
</div>
</body>
</html>

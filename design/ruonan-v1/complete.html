<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听刻 · 完成 V1 — 轻薄荷</title>
<style>
  :root {
    --color-brand-primary: #02B47F;
    --color-brand-primary-dark: #019A6C;
    --color-brand-secondary: #F8D9D6;
    --color-success: #2ECC71;
    --color-error: #E74C3C;
    --color-warning: #F39C12;
    --color-text-primary: rgba(0,0,0,0.9);
    --color-text-secondary: rgba(0,0,0,0.6);
    --color-text-tertiary: rgba(0,0,0,0.3);
    --color-text-quaternary: rgba(0,0,0,0.2);
    --color-text-inverse: #FFFFFF;
    --color-neutral-1: #FFFFFF;
    --color-neutral-2: #F1F3F5;
    --color-neutral-3: #F2F4F7;
    --color-neutral-4: #E9ECF0;
    --color-neutral-5: #DCE2E8;
    --color-background-page: #F1F3F5;
    --color-background-surface: #FFFFFF;
    --border-radius-sm: 4px;
    --border-radius-md: 8px;
    --border-radius-mg: 12px;
    --border-radius-lg: 16px;
    --border-radius-xl: 24px;
    --border-radius-2xl: 32px;
    --border-radius-full: 9999px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px rgba(0,0,0,0.08);
    --shadow-lg: 0 10px 15px rgba(0,0,0,0.12);
    --font-family-sans: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-size-display-s: 24px;
    --font-size-title-l: 22px;
    --font-size-title-m: 20px;
    --font-size-title-s: 18px;
    --font-size-body-m: 16px;
    --font-size-body-s: 14px;
    --font-size-caption-l: 12px;
    --font-weight-regular: 400;
    --font-weight-medium: 500;
    --font-weight-semibold: 600;
    --font-weight-bold: 700;
  }
  @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration:0.01ms!important; animation-iteration-count:1!important; } }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1A1A2E; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:var(--font-family-sans); padding:20px; }
  .phone { width:390px; height:844px; background:var(--color-neutral-1); border-radius:44px; overflow:hidden; position:relative; box-shadow:0 0 0 8px #222, 0 0 0 10px #444, 0 24px 80px rgba(0,0,0,0.35); }
  .dynamic-island { position:absolute; top:11px; left:50%; transform:translateX(-50%); width:126px; height:36px; background:#111; border-radius:20px; z-index:20; pointer-events:none; }
  .screen { width:100%; height:100%; display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .screen::before { content:''; position:absolute; top:0; left:0; right:0; height:100%; background:linear-gradient(180deg, #02B47F 0%, rgba(2,180,127,0.92) 30%, rgba(2,180,127,0.6) 60%, rgba(2,180,127,0.3) 100%); pointer-events:none; z-index:0; }
  .status-bar { height:54px; padding:54px 32px 0 32px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; z-index:15; position:relative; }
  .status-bar .time { font-size:15px; font-weight:590; color:var(--color-text-inverse); letter-spacing:0.3px; }
  .status-icons svg { display:block; }
  .status-icons .st0 { fill:var(--color-text-inverse); }
  .content { flex:1; display:flex; flex-direction:column; align-items:center; padding:40px 28px 0; position:relative; z-index:1; }

  @keyframes confetti-fall {
    0% { transform:translateY(-10px) rotate(0deg); opacity:1; }
    100% { transform:translateY(300px) rotate(720deg); opacity:0; }
  }
  @keyframes scale-in {
    0% { transform:scale(0.5); opacity:0; }
    70% { transform:scale(1.1); }
    100% { transform:scale(1); opacity:1; }
  }
  @keyframes slide-up {
    0% { transform:translateY(20px); opacity:0; }
    100% { transform:translateY(0); opacity:1; }
  }

  .celebration { text-align:center; margin-bottom:24px; }
  .celebration .emoji { font-size:56px; animation:scale-in 0.6s ease-out; display:block; margin-bottom:8px; }
  .celebration .title { font-size:28px; font-weight:700; color:#fff; animation:slide-up 0.4s ease-out 0.2s both; }
  .celebration .sub { font-size:var(--font-size-body-s); color:rgba(255,255,255,0.7); margin-top:8px; animation:slide-up 0.4s ease-out 0.3s both; }

  .stats-card { width:100%; background:rgba(255,255,255,0.95); border-radius:var(--border-radius-xl); padding:28px 24px; box-shadow:var(--shadow-lg); animation:slide-up 0.5s ease-out 0.4s both; }
  .stats-card .big-number { text-align:center; margin-bottom:20px; }
  .stats-card .big-number .num { font-size:48px; font-weight:700; color:var(--color-brand-primary); }
  .stats-card .big-number .label { font-size:var(--font-size-body-s); color:var(--color-text-secondary); margin-top:4px; }
  .stats-card .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
  .stats-card .stat-item { text-align:center; padding:12px; background:var(--color-neutral-2); border-radius:var(--border-radius-mg); }
  .stats-card .stat-item .val { font-size:22px; font-weight:700; }
  .stats-card .stat-item .val.green { color:var(--color-success); }
  .stats-card .stat-item .val.red { color:var(--color-error); }
  .stats-card .stat-item .val.brand { color:var(--color-brand-primary); }
  .stats-card .stat-item .lbl { font-size:11px; color:var(--color-text-tertiary); margin-top:4px; }

  .streak-update { display:flex; align-items:center; justify-content:center; gap:10px; padding:12px; background:rgba(255,107,53,0.08); border-radius:var(--border-radius-full); margin-bottom:20px; }
  .streak-update .flame { font-size:20px; }
  .streak-update .text { font-size:var(--font-size-body-s); color:var(--color-text-secondary); }
  .streak-update .num { font-size:20px; font-weight:700; color:#FF6B35; }

  .blind-words { margin-bottom:20px; }
  .blind-words .label { font-size:var(--font-size-body-s); color:var(--color-text-secondary); margin-bottom:8px; font-weight:500; }
  .blind-words .word-list { display:flex; flex-wrap:wrap; gap:8px; }
  .blind-words .word { padding:4px 14px; border-radius:var(--border-radius-full); background:rgba(231,76,60,0.08); color:var(--color-error); font-size:var(--font-size-body-s); }

  .btn-primary { width:100%; height:48px; background:var(--color-brand-primary); color:#fff; border:none; border-radius:var(--border-radius-mg); font-size:16px; font-weight:500; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 4px 14px rgba(2,180,127,0.25); transition:background 0.2s; }
  .btn-primary:hover { background:var(--color-brand-primary-dark); }
  .btn-secondary { width:100%; height:44px; background:transparent; border:none; font-size:var(--font-size-body-s); color:rgba(255,255,255,0.7); cursor:pointer; font-family:inherit; margin-top:12px; transition:color 0.2s; }
  .btn-secondary:hover { color:#fff; }

  .spacer-flex { flex:1; min-height:16px; }

  .safe-area { height:34px; flex-shrink:0; }
</style>
</head>
<body>
<div class="phone">
  <div class="dynamic-island"></div>
  <div class="screen">
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons">
        <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="8" width="3" height="4" rx="0.5" class="st0"/><rect x="4.5" y="5" width="3" height="7" rx="0.5" class="st0"/><rect x="9" y="2.5" width="3" height="9.5" rx="0.5" class="st0"/><rect x="13.5" y="0" width="3" height="12" rx="0.5" class="st0"/></svg>
        <svg width="15" height="12" viewBox="0 0 15 12"><circle cx="7.5" cy="10.5" r="1.2" class="st0"/><path d="M7.5 6.5C9.09 6.5 10.5 7.12 11.54 8.14L10.48 9.2C9.72 8.44 8.66 8 7.5 8C6.34 8 5.28 8.44 4.52 9.2L3.46 8.14C4.5 7.12 5.91 6.5 7.5 6.5Z" class="st0"/><path d="M7.5 3.5C10.08 3.5 12.42 4.5 14.14 6.21L13.08 7.27C11.64 5.83 9.68 5 7.5 5C5.32 5 3.36 5.83 1.92 7.27L0.86 6.21C2.58 4.5 4.92 3.5 7.5 3.5Z" class="st0"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="2" fill="none" stroke="white" stroke-width="1"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="white"/><rect x="22" y="4" width="3" height="4" rx="1" fill="white"/></svg>
      </div>
    </div>
    <div class="content">

      <!-- Celebration -->
      <div class="celebration">
        <span class="emoji">🎉</span>
        <div class="title">太棒了！</div>
        <div class="sub">今日练习已全部完成</div>
      </div>

      <!-- Stats Card -->
      <div class="stats-card">
        <div class="big-number">
          <div class="num">64%</div>
          <div class="label">今日辨音准确率</div>
        </div>
        <div class="stat-grid">
          <div class="stat-item">
            <div class="val green">6</div>
            <div class="lbl">正确词汇</div>
          </div>
          <div class="stat-item">
            <div class="val red">3</div>
            <div class="lbl">听错词汇</div>
          </div>
          <div class="stat-item">
            <div class="val brand">2</div>
            <div class="lbl">没听出来</div>
          </div>
          <div class="stat-item">
            <div class="val brand">86</div>
            <div class="lbl">跟读评分</div>
          </div>
        </div>

        <!-- Streak Update -->
        <div class="streak-update">
          <span class="flame">🔥</span>
          <span class="text">连续打卡</span>
          <span class="num">7</span>
          <span class="text">天</span>
        </div>

        <!-- Blind Words -->
        <div class="blind-words">
          <div class="label">今日盲区词汇</div>
          <div class="word-list">
            <span class="word">pressing</span>
            <span class="word">rise</span>
            <span class="word">extreme</span>
          </div>
        </div>

        <button class="btn-primary">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3V13M3 8H13" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
          明天继续
        </button>
      </div>

      <button class="btn-secondary">分享打卡 (可选)</button>

      <div class="spacer-flex"></div>

    </div>
    <div class="safe-area"></div>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听刻 · 听写页面 V4 — 高保真设计稿</title>
<style>
  /* ═══════════════════════════════════════════════
     DESIGN SYSTEM TOKENS
     ═══════════════════════════════════════════════ */
  :root {
    --primary: #1E3A5F;
    --primary-light: #2D5A8E;
    --primary-bg: #E8EDF2;
    --accent: #FF6B35;
    --accent-light: #FF8C5A;
    --bg: #F5F7FA;
    --surface: #FFFFFF;
    --text-primary: #2D3436;
    --text-secondary: #636E72;
    --text-hint: #B2BEC3;
    --success: #00B894;
    --error: #FF6B6B;
    --divider: #DFE6E9;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-max: 24px;
    --shadow-card: 0 2px 8px rgba(0,0,0,0.08);
    --font: -apple-system, "PingFang SC", "SF Pro", "Helvetica Neue", sans-serif;
  }

  /* ── Reduced Motion ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1A1A2E;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: var(--font);
    padding: 20px;
  }

  /* ═══════════════════════════════════════════════
     iPhone 14 Pro FRAME
     ═══════════════════════════════════════════════ */
  .phone {
    width: 390px;
    height: 844px;
    background: var(--surface);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 8px #222,
      0 0 0 10px #444,
      0 24px 80px rgba(0,0,0,0.35);
  }

  .dynamic-island {
    position: absolute;
    top: 11px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 36px;
    background: #111;
    border-radius: 20px;
    z-index: 20;
    pointer-events: none;
  }

  .screen {
    width: 100%;
    height: 100%;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ═══════════════════════════════════════════════
     STATUS BAR
     ═══════════════════════════════════════════════ */
  .status-bar {
    height: 54px;
    padding: 54px 32px 0 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    z-index: 15;
  }
  .status-bar .time {
    font-size: 15px;
    font-weight: 590;
    color: var(--text-primary);
  }
  .status-icons { display: flex; align-items: center; gap: 6px; }
  .status-icons svg { display: block; }

  /* ═══════════════════════════════════════════════
     TOP BAR
     ═══════════════════════════════════════════════ */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 24px 0;
    flex-shrink: 0;
  }

  /* ── Step Track ── */
  .step-track {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .step-dot {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    flex-shrink: 0;
  }
  .step-dot.done {
    background: #E8F8F5;
  }
  .step-dot.done svg { display: block; }
  .step-dot.active {
    background: var(--accent);
    box-shadow: 0 0 0 4px rgba(255,107,53,0.15);
  }
  .step-dot.active span {
    color: #FFF;
    font-size: 11px;
    font-weight: 700;
  }
  .step-dot.pending {
    background: var(--divider);
  }
  .step-dot.pending span {
    color: var(--text-hint);
    font-size: 11px;
    font-weight: 700;
  }
  .step-line {
    width: 28px;
    height: 2px;
    border-radius: 1px;
    transition: background 0.3s ease;
    flex-shrink: 0;
  }
  .step-line.done { background: var(--success); }
  .step-line.pending { background: var(--divider); }

  /* ── Exit Button (SVG close icon) ── */
  .btn-exit {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: background 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }
  .btn-exit:hover { background: var(--bg); }
  .btn-exit:active { background: var(--divider); }
  .btn-exit:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .btn-exit svg { display: block; }

  /* ── Step Labels ── */
  .step-labels {
    display: flex;
    justify-content: center;
    gap: 36px;
    margin-top: 5px;
    padding: 0 28px;
    flex-shrink: 0;
    user-select: none;
  }
  .step-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-hint);
    text-align: center;
    transition: color 0.3s ease;
  }
  .step-label.done { color: var(--success); }
  .step-label.active { color: var(--accent); font-weight: 600; }

  /* ═══════════════════════════════════════════════
     CONTENT
     ═══════════════════════════════════════════════ */
  .content {
    flex: 1;
    padding: 14px 24px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
  }

  .section-header {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-secondary);
    text-align: center;
    flex-shrink: 0;
    user-select: none;
  }

  /* ═══════════════════════════════════════════════
     CARD
     ═══════════════════════════════════════════════ */
  .card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 20px;
    box-shadow: var(--shadow-card);
    flex-shrink: 0;
  }

  /* ── Waveform ── */
  .waveform-svg {
    width: 100%;
    height: 48px;
    display: block;
    margin-bottom: 12px;
  }

  /* ── Playback Controls ── */
  .playback-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 10px;
  }
  .ctrl-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }
  .ctrl-btn:hover { background: var(--bg); }
  .ctrl-btn:active { background: var(--divider); }
  .ctrl-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .ctrl-btn.btn-play {
    width: 44px;
    height: 44px;
    background: var(--primary);
    box-shadow: 0 3px 10px rgba(30,58,95,0.25);
    transition: background 0.2s ease, box-shadow 0.2s ease;
  }
  .ctrl-btn.btn-play:hover {
    background: var(--primary-light);
    box-shadow: 0 5px 14px rgba(30,58,95,0.20);
  }
  .ctrl-btn.btn-play:active {
    box-shadow: 0 2px 6px rgba(30,58,95,0.15);
  }
  .ctrl-btn.btn-play svg { display: block; }

  /* ── Playback Meta ── */
  .playback-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 10px;
    border-top: 1px solid var(--bg);
  }
  .playback-meta .sentence-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    user-select: none;
  }
  .playback-meta .time-display {
    font-size: 12px;
    color: var(--text-hint);
    font-variant-numeric: tabular-nums;
    user-select: none;
  }

  .speed-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: var(--bg);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--primary);
    cursor: pointer;
    transition: background 0.2s ease;
    border: none;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }
  .speed-chip:hover { background: var(--divider); }
  .speed-chip:focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
  }

  /* ═══════════════════════════════════════════════
     DICTATION INPUT
     ═══════════════════════════════════════════════ */
  .word-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    min-height: 72px;
    line-height: 2;
    margin-bottom: 10px;
  }

  .word-token {
    display: inline-flex;
    align-items: center;
    min-height: 30px;
    border-radius: var(--radius-sm);
    padding: 2px 10px;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s ease;
    user-select: none;
  }
  .word-token.correct {
    background: #E8F8F5;
    color: var(--success);
  }
  .word-token.error {
    background: #FFF5F5;
    color: var(--error);
    text-decoration: line-through;
    text-decoration-color: var(--error);
    text-decoration-thickness: 1.5px;
  }
  .word-token.error .correction {
    font-weight: 600;
    color: var(--error);
    text-decoration: none;
    margin-left: 2px;
  }
  .word-token.blank {
    background: var(--bg);
    color: var(--text-hint);
  }

  .word-input {
    display: inline-flex;
    align-items: center;
    height: 32px;
    min-width: 52px;
    padding: 0 8px;
    border: none;
    border-bottom: 2.5px solid var(--divider);
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    color: var(--text-primary);
    background: transparent;
    outline: none;
    caret-color: var(--accent);
    transition: border-bottom-color 0.2s ease;
  }
  .word-input::placeholder {
    color: var(--text-hint);
    font-size: 13px;
    font-weight: 400;
  }
  .word-input:focus {
    border-bottom-color: var(--primary);
    border-bottom-width: 3px;
  }

  .dictation-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .dictation-meta .sentence-text {
    font-size: 12px;
    color: var(--text-hint);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    user-select: none;
  }
  .dictation-meta .word-progress {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    flex-shrink: 0;
    margin-left: 12px;
    user-select: none;
  }
  .dictation-meta .word-progress .count-highlight {
    color: var(--text-primary);
    font-weight: 600;
  }

  .tap-hint {
    font-size: 11px;
    color: var(--text-hint);
    text-align: center;
    user-select: none;
  }

  /* ═══════════════════════════════════════════════
     ACTION BUTTONS
     ═══════════════════════════════════════════════ */
  .action-row {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  .btn-secondary {
    flex: 1;
    height: 48px;
    min-width: 44px;
    background: var(--surface);
    color: var(--text-secondary);
    border: 1.5px solid var(--divider);
    border-radius: var(--radius-md);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }
  .btn-secondary:hover {
    background: var(--bg);
    border-color: var(--text-hint);
  }
  .btn-secondary:active {
    background: var(--divider);
  }
  .btn-secondary:focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
  }
  .btn-secondary:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .btn-secondary svg { flex-shrink: 0; }

  .btn-primary-sm {
    flex: 2;
    height: 48px;
    min-width: 44px;
    background: var(--primary);
    color: #FFF;
    border: none;
    border-radius: var(--radius-md);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease, box-shadow 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: 0 3px 10px rgba(30,58,95,0.25);
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }
  .btn-primary-sm:hover {
    background: var(--primary-light);
    box-shadow: 0 5px 14px rgba(30,58,95,0.20);
  }
  .btn-primary-sm:active {
    box-shadow: 0 1px 6px rgba(30,58,95,0.15);
  }
  .btn-primary-sm:focus-visible {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }
  .btn-primary-sm:disabled {
    background: var(--primary-bg);
    color: rgba(30,58,95,0.4);
    box-shadow: none;
    cursor: not-allowed;
  }

  /* ═══════════════════════════════════════════════
     RESULT CARD — SVG status icons
     ═══════════════════════════════════════════════ */
  .result-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    box-shadow: var(--shadow-card);
    flex-shrink: 0;
  }
  .result-card .result-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-hint);
    margin-bottom: 10px;
    user-select: none;
  }
  .result-card .result-words {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .result-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    user-select: none;
  }
  .result-tag.r-correct {
    background: #E8F8F5;
    color: var(--success);
  }
  .result-tag.r-error {
    background: #FFF5F5;
    color: var(--error);
  }
  .result-tag.r-error .r-fix {
    font-weight: 600;
    color: var(--error);
    margin-left: 2px;
  }
  .result-tag.r-blank {
    background: var(--bg);
    color: var(--text-hint);
  }

  .result-tag svg { flex-shrink: 0; }

  .spacer-flex { flex: 1; min-height: 8px; }

  /* ═══════════════════════════════════════════════
     SAFE AREA
     ═══════════════════════════════════════════════ */
  .safe-area {
    height: 34px;
    flex-shrink: 0;
  }
</style>
</head>

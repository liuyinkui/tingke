<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听刻 · 听写页面 — 高保真设计稿</title>
<style>
  :root {
    --primary: #1E3A5F;
    --primary-light: #2D5A8E;
    --accent: #FF6B35;
    --bg: #F5F7FA;
    --surface: #FFFFFF;
    --text-primary: #2D3436;
    --text-secondary: #636E72;
    --text-hint: #B2BEC3;
    --success: #00B894;
    --error: #FF6B6B;
    --divider: #DFE6E9;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --shadow-card: 0 2px 8px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1A1A2E;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, "PingFang SC", "SF Pro", "Helvetica Neue", sans-serif;
    padding: 20px;
  }

  .phone {
    width: 390px;
    height: 844px;
    background: var(--surface);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 8px #333,
      0 0 0 10px #555,
      0 20px 60px rgba(0,0,0,0.4);
  }

  .dynamic-island {
    position: absolute;
    top: 11px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 36px;
    background: #111;
    border-radius: 20px;
    z-index: 10;
  }

  .screen {
    width: 100%;
    height: 100%;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── Status Bar ── */
  .status-bar {
    height: 54px;
    padding: 54px 28px 0 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    z-index: 5;
  }
  .status-bar .time {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .status-icons { display: flex; align-items: center; gap: 6px; }

  /* ── Top Bar (exit + step) ── */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 20px 0;
    flex-shrink: 0;
  }
  .exit-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--text-hint);
    cursor: pointer;
    box-shadow: var(--shadow-card);
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .exit-btn:active {
    background: var(--divider);
    transform: scale(0.95);
  }

  /* ── Step Indicator ── */
  .step-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .step-dot {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    transition: all 0.3s;
  }
  .step-dot.done {
    background: #E8F8F5;
    color: var(--success);
  }
  .step-dot.active {
    background: var(--accent);
    color: #FFF;
    box-shadow: 0 0 0 4px rgba(255,107,53,0.15);
  }
  .step-dot.pending {
    background: var(--divider);
    color: var(--text-hint);
  }
  .step-line {
    width: 28px;
    height: 2px;
    border-radius: 1px;
    transition: background 0.3s;
  }
  .step-line.done { background: var(--success); }
  .step-line.pending { background: var(--divider); }

  .step-labels {
    display: flex;
    justify-content: center;
    gap: 36px;
    margin-top: 4px;
    padding: 0 20px;
    flex-shrink: 0;
  }
  .step-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-hint);
    text-align: center;
    transition: color 0.3s;
  }
  .step-label.done { color: var(--success); }
  .step-label.active { color: var(--accent); font-weight: 600; }

  /* ── Main Content ── */
  .content {
    flex: 1;
    padding: 12px 20px 0;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  /* Header */
  .dictation-header {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-secondary);
    text-align: center;
    margin-bottom: 14px;
  }

  /* ── Waveform Player ── */
  .player-card {
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 16px;
    box-shadow: var(--shadow-card);
    margin-bottom: 14px;
    flex-shrink: 0;
  }

  .waveform-svg {
    width: 100%;
    height: 44px;
    margin-bottom: 10px;
  }

  .playback-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .ctrl-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active {
    background: var(--bg);
    transform: scale(0.92);
  }
  .ctrl-btn.play {
    width: 44px;
    height: 44px;
    background: var(--primary);
    color: #FFF;
    font-size: 18px;
    box-shadow: 0 3px 10px rgba(30,58,95,0.25);
  }
  .ctrl-btn.play:active {
    background: var(--primary-light);
  }

  .playback-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--bg);
  }
  .playback-info .current-word {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .playback-info .time {
    font-size: 12px;
    color: var(--text-hint);
  }

  .speed-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--bg);
    border-radius: 12px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--primary);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Dictation Input Area ── */
  .dictation-card {
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 16px;
    box-shadow: var(--shadow-card);
    margin-bottom: 10px;
    flex-shrink: 0;
  }

  .word-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    line-height: 2;
    min-height: 80px;
  }

  /* Word tokens */
  .word-token {
    display: inline-flex;
    align-items: center;
    min-height: 32px;
    border-radius: var(--radius-sm);
    padding: 2px 8px;
    font-size: 14px;
    transition: all 0.2s;
  }
  .word-token.correct {
    background: #E8F8F5;
    color: var(--success);
    font-weight: 500;
  }
  .word-token.error {
    background: #FFF5F5;
    color: var(--error);
    text-decoration: line-through;
  }
  .word-token.error .correction {
    font-weight: 600;
    color: var(--error);
    text-decoration: none;
  }
  .word-token.blank {
    background: var(--bg);
    color: var(--text-hint);
    font-style: normal;
  }
  .word-token.blank .empty-dash {
    letter-spacing: 2px;
  }

  /* Active input field */
  .word-input {
    display: inline-flex;
    align-items: center;
    min-width: 52px;
    height: 32px;
    padding: 0 8px;
    border-bottom: 2.5px solid var(--divider);
    font-size: 15px;
    color: var(--text-primary);
    outline: none;
    background: transparent;
    transition: border-color 0.2s;
    font-family: inherit;
    caret-color: var(--accent);
  }
  .word-input:focus {
    border-bottom-color: var(--primary);
  }
  .word-input::placeholder {
    color: var(--text-hint);
    font-size: 13px;
  }

  /* Sentence label */
  .current-sentence {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--bg);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .current-sentence .label {
    font-size: 12px;
    color: var(--text-hint);
  }
  .current-sentence .word-count {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .current-sentence .word-count span {
    color: var(--text-primary);
    font-weight: 600;
  }

  .tap-hint {
    font-size: 11px;
    color: var(--text-hint);
    text-align: center;
    margin-bottom: 4px;
  }

  /* ── Action Buttons ── */
  .action-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    flex-shrink: 0;
  }
  .btn-secondary {
    flex: 1;
    height: 48px;
    background: var(--surface);
    color: var(--text-secondary);
    border: 1.5px solid var(--divider);
    border-radius: var(--radius-md);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-secondary:active {
    background: var(--bg);
    border-color: var(--text-hint);
  }
  .btn-primary-sm {
    flex: 2;
    height: 48px;
    background: var(--primary);
    color: #FFF;
    border: none;
    border-radius: var(--radius-md);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: 0 3px 12px rgba(30,58,95,0.25);
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary-sm:active {
    background: var(--primary-light);
    transform: scale(0.98);
  }

  /* ── Previous Sentence Result ── */
  .prev-result {
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    box-shadow: var(--shadow-card);
    flex-shrink: 0;
  }
  .prev-result .title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-hint);
    margin-bottom: 8px;
  }
  .prev-result .words {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }
  .result-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    font-size: 13px;
  }
  .result-tag.r-correct {
    background: #E8F8F5;
    color: var(--success);
  }
  .result-tag.r-error {
    background: #FFF5F5;
    color: var(--error);
  }
  .result-tag.r-error .r-correction {
    font-weight: 600;
    color: var(--error);
    margin-left: 2px;
  }
  .result-tag.r-blank {
    background: var(--bg);
    color: var(--text-hint);
  }

  /* ── Spacer ── */
  .spacer-auto { flex: 1; min-height: 12px; }
  .safe-area-bottom { height: 34px; flex-shrink: 0; }
</style>
</head>

          <span class="word-token blank"><span class="empty-dash">___</span></span>
          <span class="word-token correct">and</span>
          <input class="word-input" type="text" placeholder="···" style="min-width:70px;">
        </div>

        <div class="current-sentence">
          <span class="label">当前句: "Today, we're going to learn about weather patterns and climate change."</span>
          <span class="word-count">已写 <span>5</span> / <span>11</span> 词</span>
        </div>
        <div class="tap-hint">点击空格听当前句</div>
      </div>

      <!-- Action Buttons -->
      <div class="action-row">
        <button class="btn-secondary">🔁 再听一遍</button>
        <button class="btn-primary-sm">提交</button>
      </div>

      <!-- Previous Sentence Result -->
      <div class="prev-result">
        <div class="title">上句结果</div>
        <div class="words">
          <span class="result-tag r-correct">✅ Today</span>
          <span class="result-tag r-error">❌ whether → <span class="r-correction">weather</span></span>
          <span class="result-tag r-blank">⚪ ___ 未填写</span>
          <span class="result-tag r-correct">✅ climate</span>
          <span class="result-tag r-correct">✅ change</span>
        </div>
      </div>

      <div class="spacer-auto"></div>
    </div>

    <!-- Safe Area -->
    <div class="safe-area-bottom"></div>

  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听刻 · 盲听 V2 — 专业白</title>
<style>
  :root {
    --color-brand-primary: #02B47F;
    --color-brand-primary-dark: #019A6C;
    --color-brand-secondary: #F8D9D6;
    --color-success: #2ECC71;
    --color-error: #E74C3C;
    --color-text-primary: rgba(0,0,0,0.9);
    --color-text-secondary: rgba(0,0,0,0.6);
    --color-text-tertiary: rgba(0,0,0,0.3);
    --color-text-quaternary: rgba(0,0,0,0.2);
    --color-text-inverse: #FFFFFF;
    --color-neutral-1: #FFFFFF;
    --color-neutral-2: #F1F3F5;
    --color-neutral-3: #F2F4F7;
    --color-neutral-4: #E9ECF0;
    --color-neutral-5: #DCE2E8;
    --color-neutral-6: #BEC5CD;
    --color-background-page: #F1F3F5;
    --color-background-surface: #FFFFFF;
    --border-radius-sm: 4px;
    --border-radius-md: 8px;
    --border-radius-mg: 12px;
    --border-radius-lg: 16px;
    --border-radius-xl: 24px;
    --border-radius-full: 9999px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px rgba(0,0,0,0.08);
    --shadow-lg: 0 10px 15px rgba(0,0,0,0.12);
    --font-family-sans: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-size-title-m: 20px;
    --font-size-title-s: 18px;
    --font-size-body-m: 16px;
    --font-size-body-s: 14px;
    --font-size-caption-l: 12px;
    --font-weight-regular: 400;
    --font-weight-medium: 500;
    --font-weight-semibold: 600;
    --font-weight-bold: 700;
  }
  @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration:0.01ms!important; animation-iteration-count:1!important; transition-duration:0.01ms!important; } }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1A1A2E; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:var(--font-family-sans); padding:20px; }
  .phone { width:390px; height:844px; background:var(--color-neutral-1); border-radius:44px; overflow:hidden; position:relative; box-shadow:0 0 0 8px #222, 0 0 0 10px #444, 0 24px 80px rgba(0,0,0,0.35); }
  .dynamic-island { position:absolute; top:11px; left:50%; transform:translateX(-50%); width:126px; height:36px; background:#111; border-radius:20px; z-index:20; pointer-events:none; }
  .screen { width:100%; height:100%; background:var(--color-neutral-1); display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .screen::before { content:''; position:absolute; top:0; left:0; right:0; height:160px; background:linear-gradient(180deg, rgba(2,180,127,0.03) 0%, transparent 100%); pointer-events:none; z-index:0; }
  .status-bar { height:54px; padding:54px 32px 0 32px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; z-index:15; position:relative; }
  .status-bar .time { font-size:15px; font-weight:590; color:var(--color-text-primary); letter-spacing:0.3px; }
  .status-icons svg { display:block; }
  .status-icons .st0 { fill:var(--color-text-primary); }
  .content { flex:1; display:flex; flex-direction:column; padding:24px 28px 0; position:relative; z-index:1; }

  .back-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
  .back-btn { display:flex; align-items:center; gap:4px; font-size:var(--font-size-body-s); color:var(--color-text-secondary); cursor:pointer; border:none; background:none; font-family:inherit; padding:4px 0; }
  .back-btn:hover { color:var(--color-text-primary); }
  .close-btn { color:var(--color-text-tertiary); cursor:pointer; padding:4px; }

  /* Step Progress - thin line style */
  .step-progress-v2 { display:flex; align-items:center; gap:0; margin-bottom:32px; }
  .step-progress-v2 .step { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }
  .step-progress-v2 .step-line { width:100%; height:2px; background:var(--color-neutral-4); }
  .step-progress-v2 .step.active .step-line { background:var(--color-brand-primary); }
  .step-progress-v2 .step.done .step-line { background:var(--color-brand-primary); }
  .step-progress-v2 .step-num { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; background:var(--color-neutral-3); color:var(--color-text-tertiary); margin-bottom:4px; }
  .step-progress-v2 .step.active .step-num { background:var(--color-brand-primary); color:#fff; }
  .step-progress-v2 .step.done .step-num { background:var(--color-brand-primary); color:#fff; }
  .step-progress-v2 .step-label { font-size:11px; color:var(--color-text-tertiary); }
  .step-progress-v2 .step.active .step-label { color:var(--color-text-primary); font-weight:500; }

  .listen-header { text-align:center; margin-bottom:28px; }
  .listen-header .title { font-size:var(--font-size-title-m); font-weight:var(--font-weight-semibold); color:var(--color-text-primary); margin-bottom:6px; }
  .listen-header .subtitle { font-size:var(--font-size-body-s); color:var(--color-text-tertiary); }
  .listen-header .countdown { margin-top:12px; font-size:36px; font-weight:300; color:var(--color-text-primary); letter-spacing:2px; }
  .listen-header .countdown .unit { font-size:14px; color:var(--color-text-tertiary); margin-left:2px; }

  /* Playback Card - clean minimal */
  .playback-card { background:var(--color-background-surface); border-radius:var(--border-radius-mg); padding:20px; border:1px solid var(--color-neutral-4); margin-bottom:20px; }
  .waveform-visual { display:flex; align-items:flex-end; justify-content:center; gap:2px; height:50px; margin-bottom:16px; }
  .waveform-visual .bar { width:3px; border-radius:2px; background:var(--color-neutral-5); }
  .waveform-visual .bar.active { background:var(--color-brand-primary); opacity:0.7; }
  .waveform-visual .bar:nth-child(1) { height:16px; } .waveform-visual .bar:nth-child(2) { height:30px; } .waveform-visual .bar:nth-child(3) { height:42px; }
  .waveform-visual .bar:nth-child(4) { height:38px; } .waveform-visual .bar:nth-child(5) { height:46px; } .waveform-visual .bar:nth-child(6) { height:50px; }
  .waveform-visual .bar:nth-child(7) { height:40px; } .waveform-visual .bar:nth-child(8) { height:24px; } .waveform-visual .bar:nth-child(9) { height:36px; }
  .waveform-visual .bar:nth-child(10) { height:46px; } .waveform-visual .bar:nth-child(11) { height:48px; } .waveform-visual .bar:nth-child(12) { height:34px; }
  .waveform-visual .bar:nth-child(13) { height:20px; } .waveform-visual .bar:nth-child(14) { height:32px; } .waveform-visual .bar:nth-child(15) { height:44px; }
  .waveform-visual .bar:nth-child(16) { height:38px; } .waveform-visual .bar:nth-child(17) { height:26px; } .waveform-visual .bar:nth-child(18) { height:18px; }
  .progress-time { display:flex; justify-content:space-between; font-size:var(--font-size-caption-l); color:var(--color-text-tertiary); margin-bottom:12px; }
  .progress-bar-track { height:3px; background:var(--color-neutral-3); border-radius:2px; margin-bottom:16px; overflow:hidden; }
  .progress-bar-fill { height:100%; width:35%; background:var(--color-brand-primary); border-radius:2px; }
  .play-controls { display:flex; align-items:center; justify-content:center; gap:28px; }
  .play-controls .ctrl-btn { width:36px; height:36px; border-radius:50%; border:none; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--color-text-secondary); transition:all 0.2s; }
  .play-controls .ctrl-btn:hover { background:var(--color-neutral-2); color:var(--color-text-primary); }
  .play-controls .ctrl-btn.primary { width:56px; height:56px; background:var(--color-brand-primary); color:#fff; box-shadow:0 4px 12px rgba(2,180,127,0.2); }
  .play-controls .ctrl-btn.primary:hover { background:var(--color-brand-primary-dark); }

  .speed-row { display:flex; justify-content:center; gap:12px; margin-bottom:16px; }
  .speed-btn { padding:4px 0; width:48px; text-align:center; border-radius:var(--border-radius-full); border:none; background:transparent; font-size:12px; color:var(--color-text-tertiary); cursor:pointer; font-family:inherit; transition:all 0.2s; }
  .speed-btn:hover { color:var(--color-text-primary); }
  .speed-btn.active { color:var(--color-brand-primary); font-weight:600; background:rgba(2,180,127,0.06); }

  .paragraph-card { flex:1; display:flex; flex-direction:column; }
  .paragraph-card .label { font-size:var(--font-size-caption-l); color:var(--color-text-tertiary); margin-bottom:8px; letter-spacing:1px; }
  .paragraph-card .p-text { font-size:var(--font-size-body-m); line-height:1.8; color:var(--color-text-primary); padding:16px; background:var(--color-neutral-2); border-radius:var(--border-radius-mg); }
  .paragraph-card .p-text .blank { background:var(--color-neutral-1); color:var(--color-text-tertiary); padding:1px 10px; border-radius:3px; border:1px dashed var(--color-neutral-5); }
  .paragraph-card .p-count { margin-top:8px; font-size:var(--font-size-caption-l); color:var(--color-text-tertiary); text-align:right; }

  .action-row { display:flex; gap:12px; margin-top:16px; }
  .action-row .btn-outline { flex:1; height:48px; border-radius:var(--border-radius-mg); border:1px solid var(--color-neutral-4); background:var(--color-neutral-1); font-size:15px; color:var(--color-text-secondary); cursor:pointer; font-family:inherit; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:6px; }
  .action-row .btn-outline:hover { border-color:var(--color-brand-primary); color:var(--color-brand-primary); }
  .action-row .btn-primary { flex:1; height:48px; border-radius:var(--border-radius-mg); border:none; background:var(--color-brand-primary); color:#fff; font-size:15px; font-weight:500; cursor:pointer; font-family:inherit; transition:background 0.2s; display:flex; align-items:center; justify-content:center; gap:6px; }

  .safe-area { height:34px; flex-shrink:0; }
</style>
</head>
<body>
<div class="phone">
  <div class="dynamic-island"></div>
  <div class="screen">
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons">
        <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="8" width="3" height="4" rx="0.5" class="st0"/><rect x="4.5" y="5" width="3" height="7" rx="0.5" class="st0"/><rect x="9" y="2.5" width="3" height="9.5" rx="0.5" class="st0"/><rect x="13.5" y="0" width="3" height="12" rx="0.5" class="st0"/></svg>
        <svg width="15" height="12" viewBox="0 0 15 12"><circle cx="7.5" cy="10.5" r="1.2" class="st0"/><path d="M7.5 6.5C9.09 6.5 10.5 7.12 11.54 8.14L10.48 9.2C9.72 8.44 8.66 8 7.5 8C6.34 8 5.28 8.44 4.52 9.2L3.46 8.14C4.5 7.12 5.91 6.5 7.5 6.5Z" class="st0"/><path d="M7.5 3.5C10.08 3.5 12.42 4.5 14.14 6.21L13.08 7.27C11.64 5.83 9.68 5 7.5 5C5.32 5 3.36 5.83 1.92 7.27L0.86 6.21C2.58 4.5 4.92 3.5 7.5 3.5Z" class="st0"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="#2ECC71"/><rect x="22" y="4" width="3" height="4" rx="1" fill="currentColor"/></svg>
      </div>
    </div>
    <div class="content">

      <div class="back-row">
        <button class="back-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M10 4L6 8L10 12"/></svg>
          返回
        </button>
        <svg class="close-btn" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 5L15 15M15 5L5 15"/></svg>
      </div>

      <!-- Step Progress -->
      <div class="step-progress-v2">
        <div class="step active">
          <div class="step-num">1</div>
          <div class="step-line"></div>
          <span class="step-label">盲听</span>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-line"></div>
          <span class="step-label">听写</span>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-line"></div>
          <span class="step-label">跟读</span>
        </div>
      </div>

      <!-- Header -->
      <div class="listen-header">
        <div class="title">盲听</div>
        <div class="subtitle">仔细听，不要看原文</div>
        <div class="countdown">2:48<span class="unit">剩余</span></div>
      </div>

      <!-- Playback -->
      <div class="playback-card">
        <div class="waveform-visual">
          <div class="bar active"></div><div class="bar active"></div><div class="bar active"></div><div class="bar active"></div><div class="bar active"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <div class="progress-time">
          <span>0:24</span>
          <span>3:12</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill"></div>
        </div>
        <div class="play-controls">
          <button class="ctrl-btn">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 4V14M12 4V14" stroke-linecap="round"/></svg>
          </button>
          <button class="ctrl-btn">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 9L7 6V12L10 9Z"/></svg>
          </button>
          <button class="ctrl-btn primary">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M7 4L17 11L7 18V4Z" fill="white"/></svg>
          </button>
          <button class="ctrl-btn">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 9L11 6V12L8 9Z"/></svg>
          </button>
          <button class="ctrl-btn">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="9" r="5"/><path d="M9 6V9L11 10.5" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>

      <div class="speed-row">
        <button class="speed-btn">0.5x</button>
        <button class="speed-btn">0.75x</button>
        <button class="speed-btn active">1.0x</button>
        <button class="speed-btn">1.25x</button>
        <button class="speed-btn">1.5x</button>
      </div>

      <div class="paragraph-card">
        <div class="label">当前段落</div>
        <div class="p-text">
          "Climate change is one of the most pressing <span class="blank">______</span> of our time. Scientists warn that global temperatures could <span class="blank">______</span> by up to 2 degrees Celsius..."
        </div>
        <div class="p-count">第 1 / 5 段</div>
      </div>

      <div class="action-row">
        <button class="btn-outline">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 8L6 12L14 4" stroke-linecap="round"/></svg>
          听懂了
        </button>
        <button class="btn-primary">
          进入听写
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M6 4L10 8L6 12"/></svg>
        </button>
      </div>

    </div>
    <div class="safe-area"></div>
  </div>
</div>
</body>
</html>

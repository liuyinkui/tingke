<style>
  :root {

  .content { flex:1; display:flex; flex-direction:column; padding:20px 28px 0; position:relative; z-index:1; }

  .library-top .close { color:var(--color-text-tertiary); cursor:pointer; padding:4px; }

  /* Segment Control for Difficulty */

  .segment-control .seg.active { background:var(--color-neutral-1); color:var(--color-text-primary); font-weight:500; box-shadow:0 2px 8px rgba(0,0,0,0.06); }

  /* Search */

  .search-row .search-input { flex:1; display:flex; align-items:center; gap:8px; background:var(--color-neutral-2); border-radius:var(--border-radius-mg); padding:10px 16px; }
  .search-row .search-input input { flex:1; border:none; background:transparent; font-size:14px; color:var(--color-text-primary); font-family:inherit; outline:none; }
  .search-row .search-input input::placeholder { color:var(--color-text-tertiary); }
  .search-row .search-input svg { color:var(--color-text-tertiary); flex-shrink:0; }
  .search-row .filter-icon { width:40px; height:40px; border-radius:var(--border-radius-md); border:1px solid var(--color-neutral-4); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .search-row .filter-icon svg { color:var(--color-text-secondary); }

  /* Category Row */
  .category-row { display:flex; gap:8px; margin-bottom:20px; overflow-x:auto; padding-bottom:4px; }
  .category-row .cat { padding:6px 18px; border-radius:var(--border-radius-full); border:1px solid var(--color-neutral-4); font-size:13px; color:var(--color-text-secondary); cursor:pointer; white-space:nowrap; transition:all 0.2s; background:var(--color-neutral-1); }
  .category-row .cat:hover { border-color:var(--color-brand-primary); color:var(--color-brand-primary); }
  .category-row .cat.active { background:var(--color-brand-primary); color:#fff; border-color:var(--color-brand-primary); }

  /* List */
  .material-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding-bottom:8px; }
  .material-item { display:flex; gap:14px; padding:16px; border-radius:var(--border-radius-mg); cursor:pointer; transition:all 0.2s; }
  .material-item:hover { background:var(--color-neutral-2); }
  .material-item .icon-wrap { width:48px; height:48px; border-radius:var(--border-radius-md); background:var(--color-neutral-2); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .material-item .icon-wrap svg { color:var(--color-brand-primary); }
  .material-item .details { flex:1; min-width:0; }
  .material-item .details .name { font-size:var(--font-size-body-s); font-weight:500; color:var(--color-text-primary); margin-bottom:2px; }
  .material-item .details .source { font-size:11px; color:var(--color-text-tertiary); margin-bottom:6px; }
  .material-item .details .tags { display:flex; align-items:center; gap:6px; }
  .material-item .details .tags .diff { font-size:10px; padding:2px 8px; border-radius:var(--border-radius-full); background:var(--color-neutral-2); color:var(--color-text-secondary); }
  .material-item .details .tags .diff.l1 { background:rgba(2,180,127,0.08); color:var(--color-brand-primary); }
  .material-item .details .tags .diff.l3 { background:rgba(231,76,60,0.06); color:var(--color-error); }
  .material-item .details .tags .duration { font-size:11px; color:var(--color-text-tertiary); }
  .material-item .arrow { display:flex; align-items:center; color:var(--color-text-quaternary); }

  .safe-area { height:34px; flex-shrink:0; }
</style>

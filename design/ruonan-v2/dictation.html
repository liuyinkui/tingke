<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听刻 · 听写 V2 — 专业白</title>
<style>
  :root {
    --color-brand-primary: #02B47F;
    --color-brand-primary-dark: #019A6C;
    --color-success: #2ECC71;
    --color-error: #E74C3C;
    --color-text-primary: rgba(0,0,0,0.9);
    --color-text-secondary: rgba(0,0,0,0.6);
    --color-text-tertiary: rgba(0,0,0,0.3);
    --color-text-quaternary: rgba(0,0,0,0.2);
    --color-text-inverse: #FFFFFF;
    --color-neutral-1: #FFFFFF;
    --color-neutral-2: #F1F3F5;
    --color-neutral-3: #F2F4F7;
    --color-neutral-4: #E9ECF0;
    --color-neutral-5: #DCE2E8;
    --color-neutral-6: #BEC5CD;
    --color-background-page: #F1F3F5;
    --color-background-surface: #FFFFFF;
    --border-radius-sm: 4px;
    --border-radius-md: 8px;
    --border-radius-mg: 12px;
    --border-radius-lg: 16px;
    --border-radius-full: 9999px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 6px rgba(0,0,0,0.08);
    --shadow-lg: 0 10px 15px rgba(0,0,0,0.12);
    --font-family-sans: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-size-title-m: 20px;
    --font-size-title-s: 18px;
    --font-size-body-m: 16px;
    --font-size-body-s: 14px;
    --font-size-caption-l: 12px;
    --font-weight-regular: 400;
    --font-weight-medium: 500;
    --font-weight-semibold: 600;
    --font-weight-bold: 700;
  }
  @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration:0.01ms!important; animation-iteration-count:1!important; transition-duration:0.01ms!important; } }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1A1A2E; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:var(--font-family-sans); padding:20px; }
  .phone { width:390px; height:844px; background:var(--color-neutral-1); border-radius:44px; overflow:hidden; position:relative; box-shadow:0 0 0 8px #222, 0 0 0 10px #444, 0 24px 80px rgba(0,0,0,0.35); }
  .dynamic-island { position:absolute; top:11px; left:50%; transform:translateX(-50%); width:126px; height:36px; background:#111; border-radius:20px; z-index:20; pointer-events:none; }
  .screen { width:100%; height:100%; background:var(--color-neutral-1); display:flex; flex-direction:column; position:relative; overflow:hidden; }
  .screen::before { content:''; position:absolute; top:0; left:0; right:0; height:120px; background:linear-gradient(180deg, rgba(2,180,127,0.03) 0%, transparent 100%); pointer-events:none; z-index:0; }
  .status-bar { height:54px; padding:54px 32px 0 32px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; z-index:15; position:relative; }
  .status-bar .time { font-size:15px; font-weight:590; color:var(--color-text-primary); letter-spacing:0.3px; }
  .status-icons svg { display:block; }
  .status-icons .st0 { fill:var(--color-text-primary); }
  .content { flex:1; display:flex; flex-direction:column; padding:20px 28px 0; position:relative; z-index:1; }

  .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .top-bar .back { display:flex; align-items:center; gap:4px; font-size:var(--font-size-body-s); color:var(--color-text-secondary); cursor:pointer; border:none; background:none; font-family:inherit; padding:4px 0; }
  .top-bar .close { color:var(--color-text-tertiary); cursor:pointer; padding:4px; }

  /* Step progress */
  .step-progress-v2 { display:flex; align-items:center; gap:0; margin-bottom:24px; }
  .step-progress-v2 .step { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }
  .step-progress-v2 .step-line { width:100%; height:2px; background:var(--color-neutral-4); }
  .step-progress-v2 .step.active .step-line, .step-progress-v2 .step.done .step-line { background:var(--color-brand-primary); }
  .step-progress-v2 .step-num { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; background:var(--color-neutral-3); color:var(--color-text-tertiary); margin-bottom:4px; }
  .step-progress-v2 .step.active .step-num { background:var(--color-brand-primary); color:#fff; }
  .step-progress-v2 .step.done .step-num { background:var(--color-success); color:#fff; font-size:10px; }
  .step-progress-v2 .step-label { font-size:11px; color:var(--color-text-tertiary); }
  .step-progress-v2 .step.active .step-label { color:var(--color-text-primary); font-weight:500; }

  .header-minimal { text-align:center; margin-bottom:20px; }
  .header-minimal .title { font-size:var(--font-size-title-s); font-weight:600; color:var(--color-text-primary); }
  .header-minimal .sub { font-size:var(--font-size-body-s); color:var(--color-text-tertiary); margin-top:4px; }

  /* Stats pill */
  .stats-pill { display:flex; justify-content:space-around; background:var(--color-neutral-2); border-radius:var(--border-radius-full); padding:6px 20px; margin-bottom:20px; }
  .stat-item { display:flex; align-items:center; gap:4px; }
  .stat-item .icon { font-size:14px; }
  .stat-item .num { font-size:14px; font-weight:600; }
  .stat-item .num.green { color:var(--color-success); }
  .stat-item .num.red { color:var(--color-error); }
  .stat-item .num.gray { color:var(--color-text-tertiary); }
  .stat-item .label { font-size:11px; color:var(--color-text-tertiary); }

  .dictation-scroll { flex:1; overflow-y:auto; margin-bottom:12px; display:flex; flex-direction:column; gap:12px; }
  .sentence-card { background:var(--color-background-surface); border-radius:var(--border-radius-mg); padding:16px; border:1px solid var(--color-neutral-4); }
  .sentence-card .s-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .sentence-card .s-number { font-size:11px; color:var(--color-text-tertiary); }
  .sentence-card .play-btn { font-size:11px; color:var(--color-brand-primary); cursor:pointer; display:flex; align-items:center; gap:4px; }
  .sentence-card .original { font-size:var(--font-size-body-s); color:var(--color-text-secondary); line-height:1.6; margin-bottom:8px; }
  .sentence-card input { width:100%; height:42px; border:1px solid var(--color-neutral-4); border-radius:var(--border-radius-md); padding:0 14px; font-size:var(--font-size-body-m); font-family:inherit; outline:none; background:var(--color-neutral-2); transition:all 0.2s; }
  .sentence-card input:focus { border-color:var(--color-brand-primary); background:#fff; }
  .sentence-card input.correct { border-color:var(--color-success); background:rgba(46,204,113,0.04); }
  .sentence-card input.wrong { border-color:var(--color-error); background:rgba(231,76,60,0.04); }
  .sentence-card .feedback { margin-top:6px; font-size:13px; }
  .sentence-card .feedback.correct { color:var(--color-success); }
  .sentence-card .feedback.wrong { color:var(--color-error); }
  .sentence-card .feedback .answer { font-weight:500; color:var(--color-text-primary); }

  .action-row { display:flex; gap:12px; }
  .action-row .btn-outline { flex:1; height:48px; border-radius:var(--border-radius-mg); border:1px solid var(--color-neutral-4); background:var(--color-neutral-1); font-size:15px; color:var(--color-text-secondary); cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:6px; transition:all 0.2s; }
  .action-row .btn-outline:hover { border-color:var(--color-brand-primary); color:var(--color-brand-primary); }
  .action-row .btn-primary { flex:1; height:48px; border-radius:var(--border-radius-mg); border:none; background:var(--color-brand-primary); color:#fff; font-size:15px; font-weight:500; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:6px; }

  .safe-area { height:34px; flex-shrink:0; }
</style>
</head>
<body>
<div class="phone">
  <div class="dynamic-island"></div>
  <div class="screen">
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons">
        <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="8" width="3" height="4" rx="0.5" class="st0"/><rect x="4.5" y="5" width="3" height="7" rx="0.5" class="st0"/><rect x="9" y="2.5" width="3" height="9.5" rx="0.5" class="st0"/><rect x="13.5" y="0" width="3" height="12" rx="0.5" class="st0"/></svg>
        <svg width="15" height="12" viewBox="0 0 15 12"><circle cx="7.5" cy="10.5" r="1.2" class="st0"/><path d="M7.5 6.5C9.09 6.5 10.5 7.12 11.54 8.14L10.48 9.2C9.72 8.44 8.66 8 7.5 8C6.34 8 5.28 8.44 4.52 9.2L3.46 8.14C4.5 7.12 5.91 6.5 7.5 6.5Z" class="st0"/><path d="M7.5 3.5C10.08 3.5 12.42 4.5 14.14 6.21L13.08 7.27C11.64 5.83 9.68 5 7.5 5C5.32 5 3.36 5.83 1.92 7.27L0.86 6.21C2.58 4.5 4.92 3.5 7.5 3.5Z" class="st0"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="#2ECC71"/><rect x="22" y="4" width="3" height="4" rx="1" fill="currentColor"/></svg>
      </div>
    </div>
    <div class="content">

      <div class="top-bar">
        <button class="back">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M10 4L6 8L10 12"/></svg>
          返回
        </button>
        <svg class="close" width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 5L15 15M15 5L5 15"/></svg>
      </div>

      <!-- Steps -->
      <div class="step-progress-v2">
        <div class="step done">
          <div class="step-num">✓</div>
          <div class="step-line"></div>
          <span class="step-label">盲听</span>
        </div>
        <div class="step active">
          <div class="step-num">2</div>
          <div class="step-line"></div>
          <span class="step-label">听写</span>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-line"></div>
          <span class="step-label">跟读</span>
        </div>
      </div>

      <div class="header-minimal">
        <div class="title">听写</div>
        <div class="sub">边听边打字，立即判断对错</div>
      </div>

      <!-- Stats -->
      <div class="stats-pill">
        <div class="stat-item"><span class="icon">✅</span><span class="num green">6</span><span class="label">正确</span></div>
        <div class="stat-item"><span class="icon">❌</span><span class="num red">3</span><span class="label">错误</span></div>
        <div class="stat-item"><span class="icon">⚪</span><span class="num gray">2</span><span class="label">留空</span></div>
        <div class="stat-item"><span class="icon">📊</span><span class="num" style="color:var(--color-brand-primary);">64%</span><span class="label">准确率</span></div>
      </div>

      <div class="dictation-scroll">
        <div class="sentence-card">
          <div class="s-head">
            <span class="s-number">第 1 句 / 共 5 句</span>
            <span class="play-btn">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 2.5L9 6L4 9.5V2.5Z" fill="currentColor"/></svg>
              听这句
            </span>
          </div>
          <div class="original">Climate change is one of the most pressing <span style="color:var(--color-text-quaternary);">____</span> of our time.</div>
          <input type="text" placeholder="输入你听到的单词..." class="correct" value="challenges">
          <div class="feedback correct">✅ 正确</div>
        </div>
        <div class="sentence-card">
          <div class="s-head">
            <span class="s-number">第 2 句</span>
            <span class="play-btn">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 2.5L9 6L4 9.5V2.5Z" fill="currentColor"/></svg>
              听这句
            </span>
          </div>
          <div class="original">Scientists warn that global temperatures could <span style="color:var(--color-text-quaternary);">____</span> by up to 2 degrees.</div>
          <input type="text" placeholder="输入你听到的单词..." class="wrong" value="risen">
          <div class="feedback wrong">❌ 正确答案：<span class="answer">rise</span></div>
        </div>
        <div class="sentence-card">
          <div class="s-head">
            <span class="s-number">第 3 句</span>
            <span class="play-btn">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 2.5L9 6L4 9.5V2.5Z" fill="currentColor"/></svg>
              听这句
            </span>
          </div>
          <div class="original">This would lead to more <span style="color:var(--color-text-quaternary);">____</span> weather events.</div>
          <input type="text" placeholder="输入你听到的单词...">
        </div>
      </div>

      <div class="action-row">
        <button class="btn-outline">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 8L6 12L14 4" stroke-linecap="round"/></svg>
          检查全部
        </button>
        <button class="btn-primary">
          进入跟读
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M6 4L10 8L6 12"/></svg>
        </button>
      </div>

    </div>
    <div class="safe-area"></div>
  </div>
</div>
</body>
</html>

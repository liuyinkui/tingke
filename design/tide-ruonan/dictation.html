<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>听刻 · 听写页（潮汐风格）</title>
<style>
/* ================================================
   听刻 - 潮汐风格设计 · 听写页
   画布: 390 × 844 (iPhone 14 Pro)
   日期: 2026-06-04
   设计师: 若楠
   ================================================ */

/* ── 设计系统 Token ── */
:root {
  --primary: #1E3A5F;
  --primary-light: #2D5A8E;
  --primary-bg: #E8EDF2;
  --accent: #FF6B35;
  --accent-light: #FF8C5A;
  --accent-bg: #FFF0E8;
  --bg: #F2F4F7;
  --bg-start: #EEF0F5;
  --bg-end: #F6F8FA;
  --bg-card: #FFFFFF;
  --text-primary: #1A1D21;
  --text-secondary: #636E72;
  --text-hint: #B2BEC3;
  --success: #00B894;
  --success-bg: #E6FAF5;
  --error: #FF6B6B;
  --error-bg: #FFF0F0;
  --divider: #E8ECF0;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-max: 24px;
  --shadow-card: 0 1px 4px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
  --shadow-card-hover: 0 2px 8px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.04);
  --font: -apple-system, "PingFang SC", "SF Pro", "Helvetica Neue", sans-serif;
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
}

*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #E8ECF0;
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
}

/* ── 手机框 ── */
.phone-frame {
  position: relative;
  width: 390px;
  height: 844px;
  background: linear-gradient(170deg, var(--bg-start) 0%, var(--bg-end) 100%);
  border-radius: 44px;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.06),
    0 8px 32px rgba(0,0,0,0.12),
    0 24px 60px rgba(0,0,0,0.08);
  overflow: hidden;
}

/* ── Dynamic Island ── */
.dynamic-island {
  position: absolute;
  top: 11px;
  left: 50%;
  transform: translateX(-50%);
  width: 126px;
  height: 34px;
  background: #000;
  border-radius: 20px;
  z-index: 20;
}

/* ── 状态栏 ── */
.status-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 54px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 32px 12px;
  z-index: 10;
  color: var(--text-primary);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.2px;
}

.status-bar .time {
  font-size: 15px;
  font-weight: 700;
}

.status-bar .icons {
  display: flex;
  gap: 6px;
  align-items: center;
}

.status-bar .icons svg {
  display: block;
}

/* ── 页面内容 ── */
.content {
  position: absolute;
  top: 54px;
  left: 0;
  right: 0;
  bottom: 34px;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 24px;
  scroll-behavior: smooth;
}

.content::-webkit-scrollbar {
  display: none;
}

/* ── 动画关键帧 ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.9); }
  to   { opacity: 1; transform: scale(1); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes breathe {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

@keyframes ripple {
  0% { box-shadow: 0 0 0 0 rgba(255, 107, 53, 0.15); }
  100% { box-shadow: 0 0 0 12px rgba(255, 107, 53, 0); }
}

@keyframes correctFlash {
  0% { background-color: var(--success-bg); }
  100% { background-color: transparent; }
}

@keyframes errorShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-4px); }
  40% { transform: translateX(4px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
}

/* ── 顶部导航 ── */
.top-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 16px;
  margin-bottom: 20px;
  animation: fadeDown 0.5s var(--ease-out) both;
}

.back-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--bg-card);
  box-shadow: var(--shadow-card);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.25s var(--ease-out);
  color: var(--text-secondary);
  font-size: 18px;
}

.back-btn:hover,
.back-btn:active {
  box-shadow: var(--shadow-card-hover);
  transform: scale(0.93);
}

.top-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
}

.top-exit {
  font-size: 13px;
  color: var(--text-hint);
  border: none;
  background: none;
  font-family: var(--font);
  cursor: pointer;
  padding: 8px;
  transition: color 0.2s;
}

.top-exit:hover {
  color: var(--text-secondary);
}

/* ── 三步进度 ── */
.step-progress {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 28px;
  animation: fadeUp 0.5s var(--ease-out) 0.05s both;
}

.step-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.step-circle {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.4s var(--ease-out);
  flex-shrink: 0;
}

.step-circle.done {
  background: var(--success);
  color: #FFFFFF;
}

.step-circle.active {
  background: var(--accent);
  color: #FFFFFF;
  box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.15);
  animation: pulse 2s ease-in-out infinite;
}

.step-circle.pending {
  background: var(--primary-bg);
  color: var(--text-hint);
}

.step-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  white-space: nowrap;
}

.step-label.active-label {
  color: var(--primary);
  font-weight: 600;
}

.step-connector {
  width: 16px;
  height: 2px;
  background: var(--divider);
  border-radius: 1px;
  position: relative;
}

.step-connector.done {
  background: var(--success);
}

/* ── 素材标题 ── */
.practice-header {
  text-align: center;
  margin-bottom: 20px;
  animation: fadeUp 0.5s var(--ease-out) 0.1s both;
}

.practice-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
}

.practice-subtitle {
  font-size: 12px;
  color: var(--text-hint);
}

/* ── 音频播放区域 ── */
.audio-player {
  background: var(--bg-card);
  border-radius: var(--radius-max);
  padding: 20px 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow-card);
  animation: scaleIn 0.6s var(--ease-out) 0.15s both;
  transition: all 0.3s var(--ease-out);
}

.audio-player:hover {
  box-shadow: var(--shadow-card-hover);
}

.audio-waveform {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  height: 48px;
  margin-bottom: 16px;
}

.audio-waveform .bar {
  width: 3px;
  background: var(--primary-bg);
  border-radius: 2px;
  transition: all 0.3s var(--ease-out);
}

.audio-waveform .bar.active {
  background: var(--accent);
}

.audio-waveform .bar:nth-child(1) { height: 12px; }
.audio-waveform .bar:nth-child(2) { height: 28px; }
.audio-waveform .bar:nth-child(3) { height: 42px; }
.audio-waveform .bar:nth-child(4) { height: 32px; }
.audio-waveform .bar:nth-child(5) { height: 18px; }
.audio-waveform .bar:nth-child(6) { height: 36px; }
.audio-waveform .bar:nth-child(7) { height: 46px; }
.audio-waveform .bar:nth-child(8) { height: 28px; }
.audio-waveform .bar:nth-child(9) { height: 38px; }
.audio-waveform .bar:nth-child(10) { height: 20px; }
.audio-waveform .bar:nth-child(11) { height: 14px; }
.audio-waveform .bar:nth-child(12) { height: 30px; }
.audio-waveform .bar:nth-child(13) { height: 44px; }
.audio-waveform .bar:nth-child(14) { height: 22px; }
.audio-waveform .bar:nth-child(15) { height: 16px; }

.audio-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

.audio-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: var(--primary-bg);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.25s var(--ease-out);
  font-size: 16px;
  flex-shrink: 0;
}

.audio-btn:hover {
  background: var(--primary);
  color: #FFFFFF;
  transform: scale(1.05);
}

.audio-btn:active {
  transform: scale(0.93);
}

.audio-btn-play {
  width: 56px;
  height: 56px;
  background: var(--accent);
  color: #FFFFFF;
  font-size: 22px;
  box-shadow: 0 2px 8px rgba(255, 107, 53, 0.2);
}

.audio-btn-play:hover {
  background: var(--accent-light);
  transform: scale(1.06);
}

.audio-btn-play.active {
  animation: ripple 1.5s ease-out infinite;
}

.audio-timer {
  font-size: 12px;
  color: var(--text-hint);
  text-align: center;
  margin-top: 12px;
  font-variant-numeric: tabular-nums;
}

/* ── 当前句子 ── */
.sentence-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  animation: fadeUp 0.5s var(--ease-out) 0.2s both;
}

.sentence-number {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-hint);
  letter-spacing: 0.5px;
}

.sentence-hint {
  font-size: 12px;
  color: var(--text-hint);
  border: none;
  background: none;
  font-family: var(--font);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
}

.sentence-hint:hover {
  background: var(--primary-bg);
  color: var(--primary);
}

/* ── 听写输入框 ── */
.dictation-input-wrapper {
  animation: slideUp 0.5s var(--ease-out) 0.25s both;
  margin-bottom: 20px;
}

.dictation-input-group {
  margin-bottom: 12px;
}

.dictation-input-group:last-child {
  margin-bottom: 0;
}

.input-label {
  font-size: 11px;
  color: var(--text-hint);
  margin-bottom: 6px;
  font-weight: 500;
  letter-spacing: 0.3px;
}

.dictation-input {
  width: 100%;
  height: 52px;
  padding: 0 16px;
  font-size: 16px;
  font-family: var(--font);
  color: var(--text-primary);
  background: var(--bg-card);
  border: 1.5px solid var(--divider);
  border-radius: var(--radius-md);
  outline: none;
  transition: all 0.3s var(--ease-out);
}

.dictation-input::placeholder {
  color: var(--text-hint);
  font-size: 15px;
  opacity: 0.7;
}

.dictation-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(30,58,95,0.06);
}

.dictation-input.correct {
  border-color: var(--success);
  background: var(--success-bg);
  color: var(--success);
  font-weight: 500;
}

.dictation-input.error {
  border-color: var(--error);
  background: var(--error-bg);
  color: var(--error);
  animation: errorShake 0.4s var(--ease-out);
}

.dictation-input:disabled {
  opacity: 0.8;
  cursor: default;
}

/* ── 结果反馈 ── */
.feedback {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  animation: fadeUp 0.3s var(--ease-out) both;
}

.feedback.correct {
  color: var(--success);
  background: var(--success-bg);
}

.feedback.error {
  color: var(--error);
  background: var(--error-bg);
}

.feedback-icon {
  font-size: 16px;
  flex-shrink: 0;
}

.feedback-text {
  font-weight: 500;
}

.feedback-answer {
  font-weight: 400;
  color: var(--text-secondary);
  margin-left: 4px;
}

/* ── 句子列表（已完成） ── */
.completed-sentences {
  margin-bottom: 16px;
}

.sentence-done {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px;
  background: var(--bg-card);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-card);
  margin-bottom: 8px;
  animation: fadeUp 0.4s var(--ease-out) both;
  transition: all 0.3s var(--ease-out);
}

.sentence-done:hover {
  box-shadow: var(--shadow-card-hover);
}

.sentence-done-num {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-hint);
  min-width: 20px;
  padding-top: 1px;
}

.sentence-done-text {
  flex: 1;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
}

.sentence-done-status {
  font-size: 16px;
  flex-shrink: 0;
  padding-top: 1px;
}

/* ── 底部操作区 ── */
.bottom-actions {
  padding: 12px 0 20px;
  background: linear-gradient(180deg, transparent 0%, var(--bg-end) 25%);
  animation: fadeUp 0.5s var(--ease-out) 0.35s both;
}

.score-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin-bottom: 16px;
}

.score-item {
  text-align: center;
}

.score-value {
  font-size: 24px;
  font-weight: 700;
  color: var(--primary);
  line-height: 1.2;
}

.score-value.score-correct {
  color: var(--success);
}

.score-value.score-wrong {
  color: var(--error);
}

.score-label {
  font-size: 11px;
  color: var(--text-hint);
  letter-spacing: 0.3px;
}

.score-divider {
  width: 1px;
  height: 32px;
  background: var(--divider);
}

.action-buttons {
  display: flex;
  gap: 12px;
}

.btn-next {
  flex: 1;
  height: 52px;
  border: none;
  background: var(--primary);
  color: #FFFFFF;
  font-size: 16px;
  font-weight: 600;
  font-family: var(--font);
  border-radius: var(--radius-lg);
  cursor: pointer;
  box-shadow: var(--shadow-btn);
  transition: all 0.35s var(--ease-out);
  letter-spacing: 0.3px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-next:hover {
  background: var(--primary-light);
  transform: translateY(-2px);
}

.btn-next:active {
  transform: translateY(0);
}

.btn-next:disabled {
  background: var(--primary-bg);
  color: var(--text-hint);
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}

.btn-skip {
  width: 52px;
  height: 52px;
  border-radius: var(--radius-lg);
  border: 1.5px solid var(--divider);
  background: var(--bg-card);
  color: var(--text-hint);
  font-size: 18px;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.25s var(--ease-out);
  display: flex;
  align-items: center;
  justify-content: center;
}

.btn-skip:hover {
  border-color: var(--primary);
  color: var(--primary);
}

/* ── 底部安全区 ── */
.safe-area {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 34px;
  pointer-events: none;
}

.safe-area-line {
  width: 134px;
  height: 5px;
  background: #D0D4DA;
  border-radius: 3px;
  margin: 10px auto 0;
}

/* ── 全屏完成态 ── */
.complete-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
  z-index: 50;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 40px;
  text-align: center;
  animation: fadeUp 0.6s var(--ease-out) both;
}

.complete-overlay.show {
  display: flex;
}

.complete-icon {
  font-size: 56px;
  margin-bottom: 20px;
  animation: scaleIn 0.6s var(--ease-out) both;
}

.complete-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 6px;
}

.complete-sub {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 32px;
}

.complete-stats {
  display: flex;
  gap: 32px;
  margin-bottom: 40px;
}

.complete-stat-value {
  font-size: 32px;
  font-weight: 700;
  color: var(--primary);
}

.complete-stat-label {
  font-size: 12px;
  color: var(--text-hint);
  margin-top: 2px;
}

.btn-complete {
  width: 200px;
  height: 52px;
  border: none;
  background: var(--primary);
  color: #FFFFFF;
  font-size: 16px;
  font-weight: 600;
  font-family: var(--font);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: all 0.35s var(--ease-out);
}

.btn-complete:hover {
  background: var(--primary-light);
  transform: translateY(-2px);
}

/* ================================================
   尺寸标注
   ================================================
   Phone Frame:       390 × 844px, border-radius: 44px
   Status Bar:        54px height
   Safe Area:         34px bottom
   Content padding:   0 24px

   Step Progress:     margin-bottom 28px
   Step Circle:       28×28px
   Audio Player:      padding 20px 24px, border-radius 24px
   Play Button:       56×56px
   Dictation Input:   52px height, border-radius 12px
   Feedback:          padding 8px 12px, border-radius 8px
   Next Button:       52px height, border-radius 18px
   ================================================ */
</style>
</head>
<body>

<div class="phone-frame">

  <!-- Dynamic Island -->
  <div class="dynamic-island"></div>

  <!-- 状态栏 -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="8" width="3" height="4" rx="0.5" fill="currentColor" opacity="0.4"/>
        <rect x="4.5" y="5.5" width="3" height="6.5" rx="0.5" fill="currentColor" opacity="0.5"/>
        <rect x="9" y="3" width="3" height="9" rx="0.5" fill="currentColor" opacity="0.6"/>
        <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="currentColor"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 10.5C8.82843 10.5 9.5 9.82843 9.5 9C9.5 8.17157 8.82843 7.5 8 7.5C7.17157 7.5 6.5 8.17157 6.5 9C6.5 9.82843 7.17157 10.5 8 10.5Z" fill="currentColor"/>
        <path d="M11.5 7.5C10.7 6.8 9.7 6.2 8 6.2C6.3 6.2 5.3 6.8 4.5 7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
        <path d="M14 4.8C12.7 3.6 10.8 2.8 8 2.8C5.2 2.8 3.3 3.6 2 4.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.35"/>
      </svg>
      <svg width="27" height="12" viewBox="0 0 27 12" fill="none">
        <rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="currentColor" opacity="0.35"/>
        <rect x="2" y="2" width="16" height="8" rx="2" fill="currentColor" opacity="0.9"/>
        <rect x="24" y="3.5" width="2.5" height="5" rx="1" fill="currentColor" opacity="0.3"/>
      </svg>
    </div>
  </div>

  <!-- 页面内容 -->
  <div class="content" id="pageContent">

    <!-- 顶部导航 -->
    <div class="top-nav">
      <button class="back-btn" aria-label="返回">‹</button>
      <span class="top-title">听写训练</span>
      <button class="top-exit">退出</button>
    </div>

    <!-- 三步进度指示器 -->
    <div class="step-progress">
      <div class="step-item">
        <div class="step-circle done">✓</div>
        <span class="step-label">盲听</span>
      </div>
      <div class="step-connector done"></div>
      <div class="step-item">
        <div class="step-circle active">2</div>
        <span class="step-label active-label">听写</span>
      </div>
      <div class="step-connector"></div>
      <div class="step-item">
        <div class="step-circle pending">3</div>
        <span class="step-label">跟读</span>
      </div>
    </div>

    <!-- 素材标题 -->
    <div class="practice-header">
      <div class="practice-title">第1句 · 共5句</div>
      <div class="practice-subtitle">TED · 如何掌控你的自由时间</div>
    </div>

    <!-- 音频播放器 -->
    <div class="audio-player">
      <div class="audio-waveform" id="waveform">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
      <div class="audio-controls">
        <button class="audio-btn" aria-label="重播">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="1,4 1,10 7,10"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
        </button>
        <button class="audio-btn" aria-label="慢速">
          <span style="font-size:11px;font-weight:700;">0.8×</span>
        </button>
        <button class="audio-btn audio-btn-play" id="playBtn" aria-label="播放">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="7,4 19,12 7,20"/>
          </svg>
        </button>
        <button class="audio-btn" aria-label="上一句">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="17,2 7,12 17,22"/>
          </svg>
        </button>
        <button class="audio-btn" aria-label="下一句">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="7,2 17,12 7,22"/>
          </svg>
        </button>
      </div>
      <div class="audio-timer" id="audioTimer">00:00 / 00:15</div>
    </div>

    <!-- 当前句子 -->
    <div class="sentence-header">
      <span class="sentence-number">句子 #1</span>
      <button class="sentence-hint" id="hintBtn">听一遍提示 ▸</button>
    </div>

    <!-- 听写输入框 -->
    <div class="dictation-input-wrapper">
      <div class="dictation-input-group">
        <div class="input-label">请输入你听到的内容</div>
        <input
          type="text"
          class="dictation-input"
          id="dictationInput"
          placeholder="输入英文句子..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />
        <div class="feedback" id="feedback" style="display:none;"></div>
      </div>
    </div>

    <!-- 已完成句子列表 -->
    <div class="completed-sentences" id="completedList">
      <!-- 示例完成项 -->
      <div class="sentence-done">
        <span class="sentence-done-num">#1</span>
        <span class="sentence-done-text">I don't have time.</span>
        <span class="sentence-done-status">✓</span>
      </div>
    </div>

    <!-- 底部操作区 -->
    <div class="bottom-actions">
      <div class="score-row">
        <div class="score-item">
          <div class="score-value score-correct">3</div>
          <div class="score-label">正确</div>
        </div>
        <div class="score-divider"></div>
        <div class="score-item">
          <div class="score-value score-wrong">1</div>
          <div class="score-label">错误</div>
        </div>
        <div class="score-divider"></div>
        <div class="score-item">
          <div class="score-value">4/5</div>
          <div class="score-label">已答题</div>
        </div>
      </div>
      <div class="action-buttons">
        <button class="btn-next" id="submitBtn">
          提交答案
        </button>
        <button class="btn-skip" id="skipBtn" aria-label="跳过">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="13,2 3,12 13,22"/>
            <line x1="18" y1="2" x2="18" y2="22"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <!-- 底部安全区 -->
  <div class="safe-area">
    <div class="safe-area-line"></div>
  </div>

  <!-- 完成覆盖层 -->
  <div class="complete-overlay" id="completeOverlay">
    <div class="complete-icon">🎉</div>
    <div class="complete-title">听写完成！</div>
    <div class="complete-sub">今日训练告一段落，你很棒</div>
    <div class="complete-stats">
      <div style="text-align:center;">
        <div class="complete-stat-value">4/5</div>
        <div class="complete-stat-label">正确率 80%</div>
      </div>
      <div style="text-align:center;">
        <div class="complete-stat-value">🔥12</div>
        <div class="complete-stat-label">连续天数</div>
      </div>
    </div>
    <button class="btn-complete" onclick="showNormalView()">进入跟读环节 →</button>
  </div>

</div>

<script>
// ── 交互状态管理 ──
var isPlaying = false;
var isSubmitted = false;

// ── 播放按钮 ──
document.getElementById('playBtn').addEventListener('click', function() {
  isPlaying = !isPlaying;
  var btn = this;
  var waveformBars = document.querySelectorAll('.audio-waveform .bar');

  if (isPlaying) {
    btn.classList.add('active');
    btn.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
      <rect x="6" y="4" width="4" height="16" rx="1"/>
      <rect x="14" y="4" width="4" height="16" rx="1"/>
    </svg>`;
    // 波形动画
    waveformBars.forEach(function(bar, i) {
      setTimeout(function() {
        bar.style.background = 'var(--accent)';
        bar.style.opacity = (0.4 + Math.random() * 0.6).toString();
      }, i * 60);
    });
  } else {
    btn.classList.remove('active');
    btn.innerHTML = `<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
      <polygon points="7,4 19,12 7,20"/>
    </svg>`;
    waveformBars.forEach(function(bar) {
      bar.style.background = '';
      bar.style.opacity = '';
    });
  }
});

// ── 提交按钮 ──
document.getElementById('submitBtn').addEventListener('click', function() {
  if (isSubmitted) {
    // 下一句逻辑（演示）
    nextSentence();
    return;
  }

  var input = document.getElementById('dictationInput');
  var feedback = document.getElementById('feedback');
  var text = input.value.trim();

  if (!text) {
    input.focus();
    input.style.borderColor = 'var(--accent)';
    setTimeout(function() {
      input.style.borderColor = '';
    }, 1000);
    return;
  }

  // 模拟判断（Demo：随机对错）
  var isCorrect = Math.random() > 0.4;
  var correctAnswer = "I don't have time.";

  input.disabled = true;
  isSubmitted = true;

  if (isCorrect) {
    input.className = 'dictation-input correct';
    feedback.className = 'feedback correct';
    feedback.style.display = 'flex';
    feedback.innerHTML = '<span class="feedback-icon">✓</span><span class="feedback-text">正确！</span>';
  } else {
    input.className = 'dictation-input error';
    feedback.className = 'feedback error';
    feedback.style.display = 'flex';
    feedback.innerHTML = '<span class="feedback-icon">✗</span><span class="feedback-text">正确答案：</span><span class="feedback-answer">' + correctAnswer + '</span>';
  }

  // 添加已完成列表
  var list = document.getElementById('completedList');
  var item = document.createElement('div');
  item.className = 'sentence-done';
  item.style.animationDelay = '0.1s';
  item.innerHTML = '<span class="sentence-done-num">#2</span>' +
    '<span class="sentence-done-text">' + (isCorrect ? text : correctAnswer) + '</span>' +
    '<span class="sentence-done-status">' + (isCorrect ? '✓' : '✗') + '</span>';
  list.appendChild(item);

  // 更新按钮
  var btn = this;
  btn.innerHTML = '下一句 →';
  btn.disabled = false;
});

// ── 下一句 ──
function nextSentence() {
  // 重置当前输入
  var input = document.getElementById('dictationInput');
  var feedback = document.getElementById('feedback');

  input.disabled = false;
  input.value = '';
  input.className = 'dictation-input';
  feedback.style.display = 'none';
  isSubmitted = false;

  var btn = document.getElementById('submitBtn');
  btn.innerHTML = '提交答案';
  btn.disabled = false;

  input.focus();

  // 模拟最后一句完成
  var currentNum = document.querySelector('.sentence-number');
  var current = parseInt(currentNum.textContent.replace('句子 #', ''));
  if (current >= 5) {
    showCompleteOverlay();
    return;
  }
  currentNum.textContent = '句子 #' + (current + 1);
}

// ── 完成覆盖 ──
function showCompleteOverlay() {
  document.getElementById('completeOverlay').classList.add('show');
}

function showNormalView() {
  document.getElementById('completeOverlay').classList.remove('show');
}

// ── 提示按钮 ──
document.getElementById('hintBtn').addEventListener('click', function() {
  var btn = this;
  btn.textContent = '播放提示中...';
  btn.style.color = 'var(--accent)';
  setTimeout(function() {
    btn.textContent = '听一遍提示 ▸';
    btn.style.color = '';
  }, 1500);
});

// ── 跳过按钮 ──
document.getElementById('skipBtn').addEventListener('click', function() {
  if (isSubmitted) {
    nextSentence();
  } else {
    // 模拟自动提交错误
    document.getElementById('dictationInput').value = '(已跳过)';
    document.getElementById('submitBtn').click();
  }
});

// ── 输入框回车提交 ──
document.getElementById('dictationInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !isSubmitted) {
    document.getElementById('submitBtn').click();
  }
});

// ── 返回按钮 ──
document.querySelector('.back-btn').addEventListener('click', function() {
  if (isSubmitted) {
    document.getElementById('dictationInput').disabled = false;
    // 实际跳转首页
  }
});
</script>

</body>
</html>

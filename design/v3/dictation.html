<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>听刻 · 听写页面 V3 — 高保真设计稿</title>
<style>
  /* ═══════════════════════════════════════════════
     DESIGN SYSTEM TOKENS
     ═══════════════════════════════════════════════ */
  :root {
    --primary: #1E3A5F;
    --primary-light: #2D5A8E;
    --primary-bg: #E8EDF2;
    --accent: #FF6B35;
    --accent-light: #FF8C5A;
    --bg: #F5F7FA;
    --surface: #FFFFFF;
    --text-primary: #2D3436;
    --text-secondary: #636E72;
    --text-hint: #B2BEC3;
    --success: #00B894;
    --error: #FF6B6B;
    --divider: #DFE6E9;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-max: 24px;
    --shadow-card: 0 2px 8px rgba(0,0,0,0.08);
    --font: -apple-system, "PingFang SC", "SF Pro", "Helvetica Neue", sans-serif;
  }

  /* ═══════════════════════════════════════════════
     RESET & BODY
     ═══════════════════════════════════════════════ */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1A1A2E;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: var(--font);
    padding: 20px;
  }

  /* ═══════════════════════════════════════════════
     iPhone 14 Pro FRAME
     ═══════════════════════════════════════════════ */
  .phone {
    width: 390px;
    height: 844px;
    background: var(--surface);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 8px #222,
      0 0 0 10px #444,
      0 24px 80px rgba(0,0,0,0.35);
  }

  .dynamic-island {
    position: absolute;
    top: 11px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 36px;
    background: #111;
    border-radius: 20px;
    z-index: 20;
    pointer-events: none;
  }

  /* ═══════════════════════════════════════════════
     SCREEN
     ═══════════════════════════════════════════════ */
  .screen {
    width: 100%;
    height: 100%;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ═══════════════════════════════════════════════
     STATUS BAR
     ═══════════════════════════════════════════════ */
  .status-bar {
    height: 54px;
    padding: 54px 32px 0 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    z-index: 15;
  }
  .status-bar .time {
    font-size: 15px;
    font-weight: 590;
    color: var(--text-primary);
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .status-icons svg { display: block; }

  /* ═══════════════════════════════════════════════
     TOP BAR — 退出 + 步骤指示器
     ═══════════════════════════════════════════════ */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 24px 0;
    flex-shrink: 0;
  }

  /* ── Exit Button ── */
  .btn-exit {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--text-hint);
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }
  .btn-exit:hover {
    background: var(--divider);
  }
  .btn-exit:active {
    transform: scale(0.92);
  }
  .btn-exit:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ── Step Indicator ── */
  .step-track {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .step-dot {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    transition: all 0.3s ease;
  }
  .step-dot.done {
    background: #E8F8F5;
    color: var(--success);
  }
  .step-dot.active {
    background: var(--accent);
    color: #FFF;
    box-shadow: 0 0 0 4px rgba(255,107,53,0.15);
    animation: step-pulse 2s ease-in-out infinite;
  }
  @keyframes step-pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(255,107,53,0.15); }
    50% { box-shadow: 0 0 0 6px rgba(255,107,53,0.08); }
  }
  .step-dot.pending {
    background: var(--divider);
    color: var(--text-hint);
  }
  .step-line {
    width: 28px;
    height: 2px;
    border-radius: 1px;
    transition: background 0.3s ease;
  }
  .step-line.done { background: var(--success); }
  .step-line.pending { background: var(--divider); }

  /* ── Step Labels ── */
  .step-labels {
    display: flex;
    justify-content: center;
    gap: 36px;
    margin-top: 5px;
    padding: 0 28px;
    flex-shrink: 0;
  }
  .step-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-hint);
    text-align: center;
    transition: color 0.3s ease;
  }
  .step-label.done { color: var(--success); }
  .step-label.active { color: var(--accent); font-weight: 600; }

  /* ═══════════════════════════════════════════════
     CONTENT (scrollable)
     ═══════════════════════════════════════════════ */
  .content {
    flex: 1;
    padding: 14px 24px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
  }

  /* ── Section Header ── */
  .section-header {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-secondary);
    text-align: center;
    flex-shrink: 0;
  }

  /* ═══════════════════════════════════════════════
     CARD — Waveform Player
     ═══════════════════════════════════════════════ */
  .card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 20px;
    box-shadow: var(--shadow-card);
    flex-shrink: 0;
  }

  .waveform-svg {
    width: 100%;
    height: 48px;
    display: block;
    margin-bottom: 12px;
  }

  .playback-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
    margin-bottom: 10px;
  }
  .ctrl-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }
  .ctrl-btn:hover { background: var(--bg); }
  .ctrl-btn:active { transform: scale(0.9); }
  .ctrl-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .ctrl-btn.btn-play {
    width: 44px;
    height: 44px;
    background: var(--primary);
    color: #FFF;
    font-size: 18px;
    box-shadow: 0 3px 10px rgba(30,58,95,0.25);
  }
  .ctrl-btn.btn-play:hover {
    background: var(--primary-light);
  }
  .ctrl-btn.btn-play:active {
    transform: scale(0.95);
  }

  .playback-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 10px;
    border-top: 1px solid var(--bg);
  }
  .playback-meta .sentence-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
  }
  .playback-meta .time-display {
    font-size: 12px;
    color: var(--text-hint);
    font-variant-numeric: tabular-nums;
  }

  .speed-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: var(--bg);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--primary);
    cursor: pointer;
    transition: background 0.15s;
    border: none;
    -webkit-tap-highlight-color: transparent;
  }
  .speed-chip:hover { background: var(--divider); }
  .speed-chip:active { background: var(--primary-bg); }

  /* ═══════════════════════════════════════════════
     CARD — Dictation Input
     ═══════════════════════════════════════════════ */
  .word-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    min-height: 72px;
    line-height: 2;
    margin-bottom: 10px;
  }

  .word-token {
    display: inline-flex;
    align-items: center;
    min-height: 30px;
    border-radius: var(--radius-sm);
    padding: 2px 10px;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s ease;
  }
  .word-token.correct {
    background: #E8F8F5;
    color: var(--success);
  }
  .word-token.error {
    background: #FFF5F5;
    color: var(--error);
    text-decoration: line-through;
    text-decoration-color: var(--error);
    text-decoration-thickness: 1.5px;
  }
  .word-token.error .correction {
    font-weight: 600;
    color: var(--error);
    text-decoration: none;
    margin-left: 2px;
  }
  .word-token.blank {
    background: var(--bg);
    color: var(--text-hint);
  }
  .word-token.blank .dash {
    letter-spacing: 2px;
  }

  /* Active input field */
  .word-input {
    display: inline-flex;
    align-items: center;
    height: 32px;
    min-width: 52px;
    padding: 0 8px;
    border: none;
    border-bottom: 2.5px solid var(--divider);
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    color: var(--text-primary);
    background: transparent;
    outline: none;
    caret-color: var(--accent);
    transition: border-bottom-color 0.2s ease;
  }
  .word-input::placeholder {
    color: var(--text-hint);
    font-size: 13px;
    font-weight: 400;
  }
  .word-input:focus {
    border-bottom-color: var(--primary);
  }
  .word-input:focus-visible {
    border-bottom-color: var(--primary);
    border-bottom-width: 3px;
  }

  /* Input error state (wrong answer) */
  .word-input.error {
    border-bottom-color: var(--error);
    color: var(--error);
  }

  /* ── Dictation Meta ── */
  .dictation-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .dictation-meta .sentence-text {
    font-size: 12px;
    color: var(--text-hint);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dictation-meta .word-progress {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    flex-shrink: 0;
    margin-left: 12px;
  }
  .dictation-meta .word-progress span {
    color: var(--text-primary);
    font-weight: 600;
  }

  .tap-hint {
    font-size: 11px;
    color: var(--text-hint);
    text-align: center;
  }

  /* ═══════════════════════════════════════════════
     ACTION BUTTONS
     ═══════════════════════════════════════════════ */
  .action-row {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  .btn-secondary {
    flex: 1;
    height: 48px;
    background: var(--surface);
    color: var(--text-secondary);
    border: 1.5px solid var(--divider);
    border-radius: var(--radius-md);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }
  .btn-secondary:hover {
    background: var(--bg);
    border-color: var(--text-hint);
  }
  .btn-secondary:active {
    background: var(--divider);
    transform: scale(0.98);
  }
  .btn-secondary:focus-visible {
    outline: 2px solid var(--primary);
    outline-offset: 2px;
  }
  .btn-secondary:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .btn-primary-sm {
    flex: 2;
    height: 48px;
    background: var(--primary);
    color: #FFF;
    border: none;
    border-radius: var(--radius-md);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.12s ease, box-shadow 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: 0 3px 10px rgba(30,58,95,0.25);
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }
  .btn-primary-sm:hover {
    background: var(--primary-light);
  }
  .btn-primary-sm:active {
    transform: scale(0.98);
    box-shadow: 0 1px 6px rgba(30,58,95,0.15);
  }
  .btn-primary-sm:focus-visible {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }
  .btn-primary-sm:disabled {
    background: var(--primary-bg);
    color: rgba(30,58,95,0.4);
    box-shadow: none;
    cursor: not-allowed;
  }

  /* ═══════════════════════════════════════════════
     CARD — Previous Result
     ═══════════════════════════════════════════════ */
  .result-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    box-shadow: var(--shadow-card);
    flex-shrink: 0;
  }
  .result-card .result-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-hint);
    margin-bottom: 10px;
  }
  .result-card .result-words {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
  }

  .result-tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
  }
  .result-tag.r-correct {
    background: #E8F8F5;
    color: var(--success);
  }
  .result-tag.r-error {
    background: #FFF5F5;
    color: var(--error);
  }
  .result-tag.r-error .r-fix {
    font-weight: 600;
    color: var(--error);
    margin-left: 2px;
  }
  .result-tag.r-blank {
    background: var(--bg);
    color: var(--text-hint);
  }

  .spacer-flex { flex: 1; min-height: 8px; }

  /* ═══════════════════════════════════════════════
     SAFE AREA
     ═══════════════════════════════════════════════ */
  .safe-area {
    height: 34px;
    flex-shrink: 0;
  }

  .design-label {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--text-hint);
    background: rgba(0,0,0,0.04);
    padding: 2px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
    z-index: 5;
  }
</style>
</head>

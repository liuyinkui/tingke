version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tingke-postgres
    environment:
      POSTGRES_DB: tingke_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tingke-redis
    ports:
      - '6379:6379'

volumes:
  pgdata:
